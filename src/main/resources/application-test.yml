spring:
  application:
    name: hanaro

  config:
    import: classpath:security.yml

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        jdbc:
          batch_size: 10
          time_zone: Asia/Seoul
        order_inserts: true
        order_updates: true
        format_sql: true
        use_sql_comments: true

  sql:
    init:
      mode: always

  flyway:
    enabled: true
    baseline-on-migrate: true